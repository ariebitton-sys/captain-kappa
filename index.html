<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Captain Kappa — Kappa Real Estate Investments</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --teal: #2BAAAD;
    --teal-dark: #1E8A8D;
    --teal-light: #E8F7F7;
    --teal-mid: #9DD8DA;
    --gray-dark: #3D3D3D;
    --gray-mid: #6B6B6B;
    --gray-light: #F0F0F0;
    --white: #FFFFFF;
    --cream: #F8F9FA;
    --border: #E2E8E8;
    --shadow: 0 2px 12px rgba(43,170,173,0.10);
  }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 68px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    box-shadow: 0 1px 6px rgba(0,0,0,0.06);
  }
  .logo-img { height: 42px; width: auto; }
  .header-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--teal-light);
    border: 1px solid var(--teal-mid);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 500;
    color: var(--teal-dark);
  }
  .dot-live {
    width: 7px; height: 7px;
    background: var(--teal);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .chat-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 760px;
    width: 100%;
    margin: 0 auto;
    padding: 0 16px;
    height: calc(100vh - 68px);
  }
  .welcome-section {
    padding: 36px 0 24px;
    text-align: center;
    flex-shrink: 0;
  }
  .captain-avatar {
    width: 68px; height: 68px;
    background: var(--teal);
    border-radius: 50%;
    margin: 0 auto 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 30px;
    font-weight: 700;
    color: var(--white);
    box-shadow: 0 4px 18px rgba(43,170,173,0.30);
  }
  .welcome-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--gray-dark);
    margin-bottom: 6px;
  }
  .welcome-subtitle {
    font-size: 14px;
    color: var(--gray-mid);
    line-height: 1.6;
    max-width: 420px;
    margin: 0 auto 26px;
  }
  .suggestions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 28px;
  }
  .suggestion-btn {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 15px;
    text-align: left;
    cursor: pointer;
    transition: all 0.18s ease;
    font-family: 'Inter', sans-serif;
  }
  .suggestion-btn:hover {
    border-color: var(--teal);
    background: var(--teal-light);
    transform: translateY(-1px);
    box-shadow: var(--shadow);
  }
  .suggestion-icon { font-size: 18px; margin-bottom: 6px; display: block; }
  .suggestion-text { font-size: 13px; font-weight: 500; color: var(--gray-dark); line-height: 1.4; }
  .divider { height: 1px; background: var(--border); margin: 4px 0; flex-shrink: 0; }
  .messages-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-height: 0;
  }
  .msg { display: flex; gap: 10px; animation: fadeIn 0.25s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.user { flex-direction: row-reverse; }
  .msg-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    margin-top: 2px;
  }
  .msg-avatar.agent {
    background: var(--teal);
    color: var(--white);
    font-family: 'Playfair Display', serif;
    font-size: 16px;
  }
  .msg-avatar.user-av { background: var(--gray-light); color: var(--gray-dark); font-size: 12px; }
  .bubble {
    max-width: 76%;
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.65;
  }
  .msg.agent .bubble {
    background: var(--white);
    color: var(--gray-dark);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }
  .msg.user .bubble {
    background: var(--teal);
    color: var(--white);
    border-top-right-radius: 4px;
  }
  .typing-bubble {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 14px;
    border-top-left-radius: 4px;
    padding: 14px 18px;
    display: flex;
    gap: 5px;
    align-items: center;
  }
  .typing-dot {
    width: 7px; height: 7px;
    background: var(--teal-mid);
    border-radius: 50%;
    animation: typingBounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); background: var(--teal-mid); }
    30% { transform: translateY(-6px); background: var(--teal); }
  }
  .error-bubble {
    background: #FFF0F0;
    border: 1px solid #FFD0D0;
    border-radius: 14px;
    padding: 12px 16px;
    font-size: 13px;
    color: #B00020;
  }
  .input-section { padding: 14px 0 22px; flex-shrink: 0; }
  .input-box {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px;
    display: flex;
    align-items: flex-end;
    gap: 10px;
    transition: border-color 0.2s;
    box-shadow: var(--shadow);
  }
  .input-box:focus-within { border-color: var(--teal); }
  .input-box textarea {
    flex: 1;
    border: none;
    outline: none;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: var(--gray-dark);
    background: transparent;
    resize: none;
    min-height: 22px;
    max-height: 120px;
    line-height: 1.5;
  }
  .input-box textarea::placeholder { color: #ABABAB; }
  .send-btn {
    width: 36px; height: 36px;
    background: var(--teal);
    border: none;
    border-radius: 9px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.18s ease;
    flex-shrink: 0;
  }
  .send-btn:hover { background: var(--teal-dark); transform: scale(1.05); }
  .send-btn:active { transform: scale(0.96); }
  .send-btn:disabled { background: #C8E8E8; cursor: not-allowed; transform: none; }
  .send-btn svg { width: 16px; height: 16px; fill: var(--white); }
  .input-footer {
    text-align: center;
    margin-top: 10px;
    font-size: 11px;
    color: #B0B0B0;
  }
  .input-footer a { color: var(--teal); text-decoration: none; }
  .messages-area::-webkit-scrollbar { width: 4px; }
  .messages-area::-webkit-scrollbar-track { background: transparent; }
  .messages-area::-webkit-scrollbar-thumb { background: var(--teal-mid); border-radius: 4px; }
  @media (max-width: 520px) {
    header { padding: 0 16px; }
    .logo-img { height: 34px; }
    .suggestions { grid-template-columns: 1fr; }
    .bubble { max-width: 88%; }
    .welcome-section { padding: 20px 0 14px; }
  }
</style>
</head>

        <span class="suggestion-text">How does Kappa find and select properties?</span>
      </button>
    </div>
    <div class="divider"></div>
  </div>

  <div id="messagesArea" class="messages-area" style="display:none; flex-direction:column;"></div>

  <div class="input-section">
    <div class="input-box">
      <textarea
        id="chatInput"
        placeholder="Ask Captain Kappa anything about investing with Kappa..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="input-footer">
      Kappa Real Estate Investments &nbsp;·&nbsp;
      <a href="mailto:arie@kappainv.com">Contact us directly</a>
    </div>
  </div>
</div>

<script>
  const N8N_WEBHOOK_URL = 'https://ariebitton.app.n8n.cloud/webhook/4dab9948-44ca-4876-a96a-c0d6bf3145bb/chat';
  let sessionId = 'sess_' + Math.random().toString(36).substr(2,9) + '_' + Date.now();
  let isWaiting = false;
  let chatStarted = false;

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function showChat() {
    if (!chatStarted) {
      document.getElementById('welcomeSection').style.display = 'none';
      const area = document.getElementById('messagesArea');
      area.style.display = 'flex';
      chatStarted = true;
    }
  }

  function appendMessage(role, text) {
    showChat();
    const area = document.getElementById('messagesArea');
    const div = document.createElement('div');
    div.className = 'msg ' + (role === 'user' ? 'user' : 'agent');
    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar ' + (role === 'user' ? 'user-av' : 'agent');
    avatar.textContent = role === 'user' ? 'You' : 'K';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    div.appendChild(avatar);
    div.appendChild(bubble);
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
  }

  function showTyping() {
    showChat();
    const area = document.getElementById('messagesArea');
    const div = document.createElement('div');
    div.className = 'msg agent';
    div.id = 'typingIndicator';
    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar agent';
    avatar.textContent = 'K';
    const bubble = document.createElement('div');
    bubble.className = 'typing-bubble';
    bubble.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
    div.appendChild(avatar);
    div.appendChild(bubble);
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  function showError(msg) {
    hideTyping();
    const area = document.getElementById('messagesArea');
    const div = document.createElement('div');
    div.className = 'msg agent';
    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar agent';
    avatar.textContent = 'K';
    const bubble = document.createElement('div');
    bubble.className = 'error-bubble';
    bubble.textContent = msg || 'Something went wrong. Please try again or email arie@kappainv.com';
    div.appendChild(avatar);
    div.appendChild(bubble);
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
  }

  async function sendSuggestion(text) {
    document.getElementById('chatInput').value = text;
    await sendMessage();
  }

  async function sendMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text || isWaiting) return;
    isWaiting = true;
    document.getElementById('sendBtn').disabled = true;
    input.value = '';
    input.style.height = 'auto';
    appendMessage('user', text);
    showTyping();
    try {
      const response = await fetch(N8N_WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, sessionId: sessionId, timestamp: new Date().toISOString() })
      });
      if (!response.ok) throw new Error('HTTP ' + response.status);
      const data = await response.json();
      hideTyping();
      const reply = data.output || data.text || data.response || data.message || (Array.isArray(data) && data[0]?.output) || '';
      if (reply) { appendMessage('agent', reply); }
      else { showError("I didn't get a response. Please try again."); }
    } catch (err) {
      showError('Connection issue. Please try again or reach us at arie@kappainv.com');
    }
    isWaiting = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }
</script>
</body>
</html>
