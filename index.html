<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>קפטן קאפה — Kappa Real Estate Investments</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --teal: #2BAAAD;
    --teal-dark: #1E8A8D;
    --teal-light: #E8F7F7;
    --teal-mid: #9DD8DA;
    --gray-dark: #3D3D3D;
    --gray-mid: #6B6B6B;
    --gray-light: #EFEFEF;
    --white: #FFFFFF;
    --cream: #F7F9F9;
    --border: #E0EBEB;
  }
  body {
    font-family: 'Heebo', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    direction: rtl;
  }
  header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 76px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    box-shadow: 0 1px 8px rgba(0,0,0,0.06);
  }
  .logo-link { cursor: pointer; display: flex; align-items: center; }
  .logo-img { height: 62px; width: auto; }
  .header-badge {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--teal-light);
    border: 1px solid var(--teal-mid);
    border-radius: 20px;
    padding: 7px 18px;
    font-size: 14px;
    font-weight: 600;
    color: var(--teal-dark);
  }
  .dot-live {
    width: 8px; height: 8px;
    background: var(--teal);
    border-radius: 50%;
    animation: pulse 2s infinite;
    flex-shrink: 0;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

  .main-layout {
    flex: 1;
    display: flex;
    align-items: stretch;
    max-width: 1160px;
    width: 100%;
    margin: 0 auto;
    padding: 0 8px;
  }

  .mascot-panel {
    width: 240px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 0;
  }
  .mascot-img {
    width: 220px;
    height: auto;
    display: block;
    filter: drop-shadow(0 6px 18px rgba(43,170,173,0.15));
  }

  .chat-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    height: calc(100vh - 76px);
  }

  .welcome-section {
    padding: 28px 0 16px;
    text-align: center;
    flex-shrink: 0;
  }
  .welcome-title {
    font-size: 26px;
    font-weight: 700;
    color: var(--gray-dark);
    margin-bottom: 8px;
  }
  .welcome-subtitle {
    font-size: 15px;
    color: var(--gray-mid);
    line-height: 1.6;
    max-width: 500px;
    margin: 0 auto 22px;
  }
  .suggestions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
    max-width: 580px;
    margin-left: auto;
    margin-right: auto;
  }
  .suggestion-btn {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    text-align: right;
    cursor: pointer;
    transition: all 0.18s ease;
    font-family: 'Heebo', sans-serif;
  }
  .suggestion-btn:hover {
    border-color: var(--teal);
    background: var(--teal-light);
    transform: translateY(-1px);
    box-shadow: 0 3px 12px rgba(43,170,173,0.12);
  }
  .suggestion-icon { font-size: 20px; margin-bottom: 6px; display: block; }
  .suggestion-text { font-size: 13px; font-weight: 500; color: var(--gray-dark); line-height: 1.4; }
  .divider { height: 1px; background: var(--border); margin: 2px 0; flex-shrink: 0; }

  .messages-area {
    flex: 1;
    overflow-y: auto;
    padding: 14px 4px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    min-height: 0;
  }
  .msg { display: flex; gap: 10px; animation: fadeIn 0.22s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
  .msg.user { flex-direction: row-reverse; }
  .msg-avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    margin-top: 2px;
  }
  .msg-avatar.agent { background: var(--teal); color: var(--white); font-size: 17px; font-family: Georgia, serif; }
  .msg-avatar.user-av { background: var(--gray-light); color: var(--gray-dark); font-size: 13px; }
  .bubble {
    max-width: 74%;
    padding: 13px 17px;
    border-radius: 16px;
    font-size: 15px;
    line-height: 1.65;
    white-space: pre-wrap;
  }
  .msg.agent .bubble {
    background: var(--white);
    color: var(--gray-dark);
    border: 1px solid var(--border);
    border-top-right-radius: 4px;
  }
  .msg.user .bubble {
    background: var(--teal);
    color: var(--white);
    border-top-left-radius: 4px;
  }
  .typing-bubble {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px;
    border-top-right-radius: 4px;
    padding: 15px 18px;
    display: flex;
    gap: 5px;
    align-items: center;
  }
  .typing-dot {
    width: 7px; height: 7px;
    background: var(--teal-mid);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing-dot:nth-child(2){animation-delay:.2s}
  .typing-dot:nth-child(3){animation-delay:.4s}
  @keyframes bounce {
    0%,60%,100%{transform:translateY(0);background:var(--teal-mid)}
    30%{transform:translateY(-7px);background:var(--teal)}
  }
  .error-bubble {
    background: #FFF0F0; border: 1px solid #FFD0D0;
    border-radius: 14px; padding: 13px 16px;
    font-size: 14px; color: #B00020;
  }
  .input-section { padding: 12px 0 18px; flex-shrink: 0; }
  .input-box {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 11px 16px;
    display: flex;
    align-items: flex-end;
    gap: 10px;
    transition: border-color 0.2s;
    box-shadow: 0 2px 10px rgba(43,170,173,0.08);
  }
  .input-box:focus-within { border-color: var(--teal); }
  .input-box textarea {
    flex: 1;
    border: none; outline: none;
    font-family: 'Heebo', sans-serif;
    font-size: 15px;
    color: var(--gray-dark);
    background: transparent;
    resize: none;
    min-height: 26px;
    max-height: 120px;
    line-height: 1.5;
    direction: rtl;
  }
  .input-box textarea::placeholder { color: #B0B8B8; }
  .send-btn {
    width: 40px; height: 40px;
    background: var(--teal); border: none;
    border-radius: 10px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.18s ease; flex-shrink: 0;
  }
  .send-btn:hover { background: var(--teal-dark); transform: scale(1.05); }
  .send-btn:active { transform: scale(0.96); }
  .send-btn:disabled { background: #C5E5E6; cursor: not-allowed; transform: none; }
  .send-btn svg { width: 18px; height: 18px; fill: white; transform: scaleX(-1); }
  .input-footer { text-align: center; margin-top: 9px; font-size: 12px; color: #B0B8B8; }
  .input-footer a { color: var(--teal); text-decoration: none; }
  .messages-area::-webkit-scrollbar{width:4px}
  .messages-area::-webkit-scrollbar-track{background:transparent}
  .messages-area::-webkit-scrollbar-thumb{background:var(--teal-mid);border-radius:4px}
  @media(max-width:720px){
    .mascot-panel{display:none}
    .suggestions{grid-template-columns:1fr}
    .bubble{max-width:86%}
    header{padding:0 16px}
    .logo-img{height:48px}
  }
</style>
</head>
