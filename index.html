<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>קפטן קאפה — Kappa Real Estate Investments</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --teal:#2BAAAD;--teal-dark:#1E8A8D;--teal-light:#E8F7F7;--teal-mid:#9DD8DA;
    --gray-dark:#3D3D3D;--gray-mid:#6B6B6B;--gray-light:#EFEFEF;
    --white:#FFFFFF;--cream:#F7F9F9;--border:#E0EBEB;
  }
  body{font-family:'Heebo',sans-serif;background:var(--cream);min-height:100vh;display:flex;flex-direction:column;direction:rtl}
  header{background:var(--white);border-bottom:1px solid var(--border);padding:0 32px;height:76px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 1px 8px rgba(0,0,0,.06)}
  .logo-link{cursor:pointer;display:flex;align-items:center}
  .logo-img{height:62px;width:auto}
  .header-badge{display:flex;align-items:center;gap:7px;background:var(--teal-light);border:1px solid var(--teal-mid);border-radius:20px;padding:7px 18px;font-size:14px;font-weight:600;color:var(--teal-dark)}
  .dot-live{width:8px;height:8px;background:var(--teal);border-radius:50%;animation:pulse 2s infinite;flex-shrink:0}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .main-layout{flex:1;display:flex;align-items:stretch;max-width:1160px;width:100%;margin:0 auto;padding:0 8px}
  .mascot-panel{width:240px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end}
  .mascot-img{width:220px;height:auto;display:block;filter:drop-shadow(0 6px 18px rgba(43,170,173,.15))}
  .chat-col{flex:1;display:flex;flex-direction:column;min-width:0;height:calc(100vh - 76px)}
  .welcome-section{padding:28px 0 16px;text-align:center;flex-shrink:0}
  .welcome-title{font-size:26px;font-weight:700;color:var(--gray-dark);margin-bottom:8px}
  .welcome-subtitle{font-size:15px;color:var(--gray-mid);line-height:1.6;max-width:500px;margin:0 auto 22px}
  .suggestions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;max-width:580px;margin-left:auto;margin-right:auto}
  .suggestion-btn{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px 16px;text-align:right;cursor:pointer;transition:all .18s ease;font-family:'Heebo',sans-serif}
  .suggestion-btn:hover{border-color:var(--teal);background:var(--teal-light);transform:translateY(-1px);box-shadow:0 3px 12px rgba(43,170,173,.12)}
  .suggestion-icon{font-size:20px;margin-bottom:6px;display:block}
  .suggestion-text{font-size:13px;font-weight:500;color:var(--gray-dark);line-height:1.4}
  .divider{height:1px;background:var(--border);margin:2px 0;flex-shrink:0}
  .messages-area{flex:1;overflow-y:auto;padding:14px 4px;display:flex;flex-direction:column;gap:14px;min-height:0}
  .msg{display:flex;gap:10px;animation:fadeIn .22s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
  .msg.user{flex-direction:row-reverse}
  .msg-avatar{width:38px;height:38px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;margin-top:2px}
  .msg-avatar.agent{background:var(--teal);color:var(--white);font-size:17px;font-family:Georgia,serif}
  .msg-avatar.user-av{background:var(--gray-light);color:var(--gray-dark);font-size:13px}
  .bubble{max-width:74%;padding:13px 17px;border-radius:16px;font-size:15px;line-height:1.65;white-space:pre-wrap}
  .msg.agent .bubble{background:var(--white);color:var(--gray-dark);border:1px solid var(--border);border-top-right-radius:4px}
  .msg.user .bubble{background:var(--teal);color:var(--white);border-top-left-radius:4px}
  .typing-bubble{background:var(--white);border:1px solid var(--border);border-radius:16px;border-top-right-radius:4px;padding:15px 18px;display:flex;gap:5px;align-items:center}
  .typing-dot{width:7px;height:7px;background:var(--teal-mid);border-radius:50%;animation:bounce 1.2s infinite}
  .typing-dot:nth-child(2){animation-delay:.2s}.typing-dot:nth-child(3){animation-delay:.4s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);background:var(--teal-mid)}30%{transform:translateY(-7px);background:var(--teal)}}
  .error-bubble{background:#FFF0F0;border:1px solid #FFD0D0;border-radius:14px;padding:13px 16px;font-size:14px;color:#B00020}
  .input-section{padding:12px 0 18px;flex-shrink:0}
  .input-box{background:var(--white);border:1.5px solid var(--border);border-radius:16px;padding:11px 16px;display:flex;align-items:flex-end;gap:10px;transition:border-color .2s;box-shadow:0 2px 10px rgba(43,170,173,.08)}
  .input-box:focus-within{border-color:var(--teal)}
  .input-box textarea{flex:1;border:none;outline:none;font-family:'Heebo',sans-serif;font-size:15px;color:var(--gray-dark);background:transparent;resize:none;min-height:26px;max-height:120px;line-height:1.5;direction:rtl}
  .input-box textarea::placeholder{color:#B0B8B8}
  .send-btn{width:40px;height:40px;background:var(--teal);border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s ease;flex-shrink:0}
  .send-btn:hover{background:var(--teal-dark);transform:scale(1.05)}
  .send-btn:active{transform:scale(.96)}
  .send-btn:disabled{background:#C5E5E6;cursor:not-allowed;transform:none}
  .send-btn svg{width:18px;height:18px;fill:white;transform:scaleX(-1)}
  .input-footer{text-align:center;margin-top:9px;font-size:12px;color:#B0B8B8}
  .input-footer a{color:var(--teal);text-decoration:none}
  .messages-area::-webkit-scrollbar{width:4px}
  .messages-area::-webkit-scrollbar-track{background:transparent}
  .messages-area::-webkit-scrollbar-thumb{background:var(--teal-mid);border-radius:4px}
  @media(max-width:720px){.mascot-panel{display:none}.suggestions{grid-template-columns:1fr}.bubble{max-width:86%}header{padding:0 16px}.logo-img{height:48px}}
</style>
</head>
<body>
<header>
  <div class="header-badge"><div class="dot-live"></div>קפטן קאפה — זמין עכשיו</div>
  <a class="logo-link" onclick="resetChat()" title="חזרה לעמוד הבית">
    <img class="logo-img" id="logoImg" alt="Kappa Real Estate Investments">
  </a>
</header>
<div class="main-layout">
  <div class="mascot-panel">
    <img class="mascot-img" id="captainImg" alt="קפטן קאפה">
  </div>
  <div class="chat-col">
    <div id="welcomeSection" class="welcome-section">
      <div class="welcome-title">שלום! אני קפטן קאפה 👋</div>
      <div class="welcome-subtitle">המדריך האישי שלך להשקעות נדל"ן עם קאפה. שאל אותי כל שאלה על עסקאות, תשואות ותהליך ההשקעה.</div>
      <div class="suggestions">
        <button class="suggestion-btn" onclick="sendSuggestion('כיצד קאפה בונה עסקאות עם משקיעים?')"><span class="suggestion-icon">🤝</span><span class="suggestion-text">כיצד קאפה בונה עסקאות עם משקיעים?</span></button>
        <button class="suggestion-btn" onclick="sendSuggestion('איזה תשואות אני יכול לצפות?')"><span class="suggestion-icon">📈</span><span class="suggestion-text">איזה תשואות אני יכול לצפות?</span></button>
        <button class="suggestion-btn" onclick="sendSuggestion('מה הסכום המינימלי להשקעה?')"><span class="suggestion-icon">💰</span><span class="suggestion-text">מה הסכום המינימלי להשקעה?</span></button>
        <button class="suggestion-btn" onclick="sendSuggestion('איך קאפה מוצאת ובוחרת נכסים?')"><span class="suggestion-icon">🏠</span><span class="suggestion-text">איך קאפה מוצאת ובוחרת נכסים?</span></button>
      </div>
      <div class="divider"></div>
    </div>
    <div id="messagesArea" class="messages-area" style="display:none;flex-direction:column;"></div>
    <div class="input-section">
      <div class="input-box">
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="שלח"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
        <textarea id="chatInput" placeholder="שאל את קפטן קאפה כל שאלה על השקעה עם קאפה..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      </div>
      <div class="input-footer">Kappa Real Estate Investments &nbsp;·&nbsp;<a href="mailto:arie@kappainv.com">צור קשר ישיר</a></div>
    </div>
  </div>
</div>
<script>
  document.getElementById('captainImg').src = 'captain.png';
  document.getElementById('logoImg').src = 'logo.jpg';

  const WEBHOOK_URL='https://ariebitton.app.n8n.cloud/webhook/4dab9948-44ca-4876-a96a-c0d6bf3145bb/chat';
  let sessionId='sess_'+Math.random().toString(36).substr(2,9)+'_'+Date.now();
  let isWaiting=false,chatStarted=false;
  function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px'}
  function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}}
  function resetChat(){document.getElementById('welcomeSection').style.display='';const a=document.getElementById('messagesArea');a.style.display='none';a.innerHTML='';chatStarted=false;sessionId='sess_'+Math.random().toString(36).substr(2,9)+'_'+Date.now()}
  function showChat(){if(!chatStarted){document.getElementById('welcomeSection').style.display='none';const a=document.getElementById('messagesArea');a.style.display='flex';chatStarted=true}}
  function appendMessage(role,text){showChat();const area=document.getElementById('messagesArea');const div=document.createElement('div');div.className='msg '+(role==='user'?'user':'agent');const avatar=document.createElement('div');avatar.className='msg-avatar '+(role==='user'?'user-av':'agent');avatar.textContent=role==='user'?'אתה':'K';const bubble=document.createElement('div');bubble.className='bubble';bubble.textContent=text;div.appendChild(avatar);div.appendChild(bubble);area.appendChild(div);area.scrollTop=area.scrollHeight}
  function showTyping(){showChat();const area=document.getElementById('messagesArea');const div=document.createElement('div');div.className='msg agent';div.id='typingIndicator';const avatar=document.createElement('div');avatar.className='msg-avatar agent';avatar.textContent='K';const bubble=document.createElement('div');bubble.className='typing-bubble';bubble.innerHTML='<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';div.appendChild(avatar);div.appendChild(bubble);area.appendChild(div);area.scrollTop=area.scrollHeight}
  function hideTyping(){const el=document.getElementById('typingIndicator');if(el)el.remove()}
  function showError(msg){hideTyping();const area=document.getElementById('messagesArea');const div=document.createElement('div');div.className='msg agent';const avatar=document.createElement('div');avatar.className='msg-avatar agent';avatar.textContent='K';const bubble=document.createElement('div');bubble.className='error-bubble';bubble.textContent=msg||'משהו השתבש. נסה שוב.';div.appendChild(avatar);div.appendChild(bubble);area.appendChild(div);area.scrollTop=area.scrollHeight}
  async function sendSuggestion(text){document.getElementById('chatInput').value=text;await sendMessage()}
  async function sendMessage(){const input=document.getElementById('chatInput');const text=input.value.trim();if(!text||isWaiting)return;isWaiting=true;document.getElementById('sendBtn').disabled=true;input.value='';input.style.height='auto';appendMessage('user',text);showTyping();try{const response=await fetch(WEBHOOK_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chatInput:text,sessionId:sessionId})});if(!response.ok)throw new Error('HTTP '+response.status);const data=await response.json();hideTyping();const reply=data.output||data.text||data.response||data.message||(Array.isArray(data)&&(data[0]?.output||data[0]?.text))||'';if(reply){appendMessage('agent',reply)}else{showError('לא התקבלה תשובה. נסה שוב.')}}catch(err){showError('בעיית חיבור. נסה שוב או פנה אלינו ב-arie@kappainv.com')}isWaiting=false;document.getElementById('sendBtn').disabled=false;input.focus()}
</script>
</body>
</html>
