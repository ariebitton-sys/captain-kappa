<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>קפטן קאפה — Kappa Real Estate Investments</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --teal:#2BAAAD;--teal-dark:#1E8A8D;--teal-light:#E8F7F7;--teal-mid:#9DD8DA;
    --gray-dark:#3D3D3D;--gray-mid:#6B6B6B;--gray-light:#EFEFEF;
    --white:#FFFFFF;--cream:#F4F8F8;--border:#DDE9E9;
  }
  body{font-family:'Heebo',sans-serif;background:var(--cream);min-height:100vh;display:flex;flex-direction:column;direction:rtl}

  header{background:var(--white);border-bottom:1px solid var(--border);padding:0 36px;height:80px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 1px 10px rgba(0,0,0,.06)}
  .logo-link{cursor:pointer;display:flex;align-items:center}
  .logo-img{height:66px;width:auto}
  .header-badge{display:flex;align-items:center;gap:8px;background:var(--teal-light);border:1px solid var(--teal-mid);border-radius:20px;padding:8px 20px;font-size:15px;font-weight:600;color:var(--teal-dark)}
  .dot-live{width:9px;height:9px;background:var(--teal);border-radius:50%;animation:pulse 2s infinite;flex-shrink:0}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

  /* PAGE LAYOUT */
  .page{flex:1;display:flex;flex-direction:column;max-width:860px;width:100%;margin:0 auto;padding:0 20px;height:calc(100vh - 80px)}

  /* WELCOME SCREEN */
  .welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 0 0}
  .captain-hero{display:flex;align-items:flex-end;gap:28px;margin-bottom:28px}
  .captain-img{width:180px;height:auto;filter:drop-shadow(0 8px 24px rgba(43,170,173,.2));flex-shrink:0}
  .captain-speech{background:var(--white);border:1px solid var(--border);border-radius:20px;border-bottom-left-radius:4px;padding:20px 24px;max-width:380px;box-shadow:0 2px 12px rgba(43,170,173,.08)}
  .captain-speech h1{font-size:22px;font-weight:700;color:var(--gray-dark);margin-bottom:6px}
  .captain-speech p{font-size:15px;color:var(--gray-mid);line-height:1.6}
  .suggestions{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;margin-bottom:20px}
  .suggestion-btn{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px 18px;text-align:right;cursor:pointer;transition:all .18s ease;font-family:'Heebo',sans-serif}
  .suggestion-btn:hover{border-color:var(--teal);background:var(--teal-light);transform:translateY(-1px);box-shadow:0 3px 14px rgba(43,170,173,.13)}
  .suggestion-icon{font-size:22px;margin-bottom:7px;display:block}
  .suggestion-text{font-size:14px;font-weight:500;color:var(--gray-dark);line-height:1.4}
  .divider{height:1px;background:var(--border);width:100%;margin-bottom:4px}

  /* CHAT */
  .chat-view{flex:1;display:flex;flex-direction:column;min-height:0}
  .messages-area{flex:1;overflow-y:auto;padding:16px 0;display:flex;flex-direction:column;gap:16px;min-height:0}
  .msg{display:flex;gap:12px;animation:fadeIn .22s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
  .msg.user{flex-direction:row-reverse}
  .msg-avatar{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;margin-top:2px}
  .msg-avatar.agent{background:var(--teal);color:var(--white);font-size:18px;font-family:Georgia,serif}
  .msg-avatar.user-av{background:var(--gray-light);color:var(--gray-dark);font-size:14px}
  .bubble{max-width:74%;padding:14px 18px;border-radius:18px;font-size:16px;line-height:1.7;white-space:pre-wrap}
  .msg.agent .bubble{background:var(--white);color:var(--gray-dark);border:1px solid var(--border);border-top-right-radius:4px}
  .msg.user .bubble{background:var(--teal);color:var(--white);border-top-left-radius:4px}
  .typing-bubble{background:var(--white);border:1px solid var(--border);border-radius:18px;border-top-right-radius:4px;padding:16px 20px;display:flex;gap:6px;align-items:center}
  .typing-dot{width:8px;height:8px;background:var(--teal-mid);border-radius:50%;animation:bounce 1.2s infinite}
  .typing-dot:nth-child(2){animation-delay:.2s}.typing-dot:nth-child(3){animation-delay:.4s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);background:var(--teal-mid)}30%{transform:translateY(-7px);background:var(--teal)}}
  .error-bubble{background:#FFF0F0;border:1px solid #FFD0D0;border-radius:16px;padding:14px 18px;font-size:15px;color:#B00020}

  /* INPUT */
  .input-section{padding:12px 0 20px;flex-shrink:0}
  .input-box{background:var(--white);border:2px solid var(--border);border-radius:18px;padding:12px 18px;display:flex;align-items:flex-end;gap:12px;transition:border-color .2s;box-shadow:0 2px 12px rgba(43,170,173,.08)}
  .input-box:focus-within{border-color:var(--teal)}
  .input-box textarea{flex:1;border:none;outline:none;font-family:'Heebo',sans-serif;font-size:16px;color:var(--gray-dark);background:transparent;resize:none;min-height:28px;max-height:120px;line-height:1.5;direction:rtl}
  .input-box textarea::placeholder{color:#B8C4C4}
  .send-btn{width:44px;height:44px;background:var(--teal);border:none;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s ease;flex-shrink:0}
  .send-btn:hover{background:var(--teal-dark);transform:scale(1.05)}
  .send-btn:active{transform:scale(.96)}
  .send-btn:disabled{background:#C5E5E6;cursor:not-allowed;transform:none}
  .send-btn svg{width:20px;height:20px;fill:white;transform:scaleX(-1)}
  .input-footer{text-align:center;margin-top:8px;font-size:13px;color:#B0B8B8}
  .input-footer a{color:var(--teal);text-decoration:none}
  .messages-area::-webkit-scrollbar{width:4px}
  .messages-area::-webkit-scrollbar-track{background:transparent}
  .messages-area::-webkit-scrollbar-thumb{background:var(--teal-mid);border-radius:4px}

  @media(max-width:620px){
    .captain-hero{flex-direction:column;align-items:center;gap:16px}
    .captain-img{width:130px}
    .suggestions{grid-template-columns:1fr}
    .bubble{max-width:88%}
    header{padding:0 16px}
    .logo-img{height:50px}
    .captain-speech{border-radius:16px}
  }
</style>
</head>
<body>

<header>
  <div class="header-badge"><div class="dot-live"></div>קפטן קאפה — זמין עכשיו</div>
  <a class="logo-link" onclick="resetChat()">
    <img class="logo-img" src="logo.jpg" alt="Kappa Real Estate Investments">
  </a>
</header>

<div class="page">

  <!-- WELCOME -->
  <div id="welcomeView" class="welcome">
    <div class="captain-hero">
      <img class="captain-img" src="captain.png" alt="קפטן קאפה">
      <div class="captain-speech">
        <h1>שלום! אני קפטן קאפה 👋</h1>
        <p>המדריך האישי שלך להשקעות נדל"ן עם קאפה. שאל אותי כל שאלה על עסקאות, תשואות ותהליך ההשקעה.</p>
      </div>
    </div>
    <div class="suggestions">
      <button class="suggestion-btn" onclick="sendSuggestion('כיצד קאפה בונה עסקאות עם משקיעים?')"><span class="suggestion-icon">🤝</span><span class="suggestion-text">כיצד קאפה בונה עסקאות עם משקיעים?</span></button>
      <button class="suggestion-btn" onclick="sendSuggestion('איזה תשואות אני יכול לצפות?')"><span class="suggestion-icon">📈</span><span class="suggestion-text">איזה תשואות אני יכול לצפות?</span></button>
      <button class="suggestion-btn" onclick="sendSuggestion('מה הסכום המינימלי להשקעה?')"><span class="suggestion-icon">💰</span><span class="suggestion-text">מה הסכום המינימלי להשקעה?</span></button>
      <button class="suggestion-btn" onclick="sendSuggestion('איך קאפה מוצאת ובוחרת נכסים?')"><span class="suggestion-icon">🏠</span><span class="suggestion-text">איך קאפה מוצאת ובוחרת נכסים?</span></button>
    </div>
    <div class="divider"></div>
  </div>

  <!-- CHAT -->
  <div id="chatView" class="chat-view" style="display:none">
    <div id="messagesArea" class="messages-area"></div>
  </div>

  <!-- INPUT -->
  <div class="input-section">
    <div class="input-box">
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
      <textarea id="chatInput" placeholder="שאל את קפטן קאפה כל שאלה על השקעה עם קאפה..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    </div>
    <div class="input-footer">Kappa Real Estate Investments &nbsp;·&nbsp;<a href="mailto:arie@kappainv.com">צור קשר ישיר</a></div>
  </div>

</div>

<script>
  const WEBHOOK='https://ariebitton.app.n8n.cloud/webhook/4dab9948-44ca-4876-a96a-c0d6bf3145bb/chat';
  let sid='sess_'+Math.random().toString(36).substr(2,9)+'_'+Date.now();
  let busy=false,started=false;

  function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px'}
  function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}}

  function resetChat(){
    document.getElementById('welcomeView').style.display='flex';
    document.getElementById('chatView').style.display='none';
    document.getElementById('messagesArea').innerHTML='';
    started=false;
    sid='sess_'+Math.random().toString(36).substr(2,9)+'_'+Date.now();
  }

  function showChat(){
    if(!started){
      document.getElementById('welcomeView').style.display='none';
      document.getElementById('chatView').style.display='flex';
      started=true;
    }
  }

  function addMsg(role,text){
    showChat();
    const area=document.getElementById('messagesArea');
    const d=document.createElement('div');d.className='msg '+(role==='user'?'user':'agent');
    const av=document.createElement('div');av.className='msg-avatar '+(role==='user'?'user-av':'agent');av.textContent=role==='user'?'אתה':'K';
    const b=document.createElement('div');b.className='bubble';b.textContent=text;
    d.appendChild(av);d.appendChild(b);area.appendChild(d);area.scrollTop=area.scrollHeight;
  }

  function showTyping(){
    showChat();
    const area=document.getElementById('messagesArea');
    const d=document.createElement('div');d.className='msg agent';d.id='typing';
    const av=document.createElement('div');av.className='msg-avatar agent';av.textContent='K';
    const b=document.createElement('div');b.className='typing-bubble';
    b.innerHTML='<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
    d.appendChild(av);d.appendChild(b);area.appendChild(d);area.scrollTop=area.scrollHeight;
  }

  function hideTyping(){const el=document.getElementById('typing');if(el)el.remove()}

  function showErr(msg){
    hideTyping();
    const area=document.getElementById('messagesArea');
    const d=document.createElement('div');d.className='msg agent';
    const av=document.createElement('div');av.className='msg-avatar agent';av.textContent='K';
    const b=document.createElement('div');b.className='error-bubble';b.textContent=msg;
    d.appendChild(av);d.appendChild(b);area.appendChild(d);area.scrollTop=area.scrollHeight;
  }

  async function sendSuggestion(t){document.getElementById('chatInput').value=t;await sendMessage()}

  async function sendMessage(){
    const inp=document.getElementById('chatInput');
    const text=inp.value.trim();
    if(!text||busy)return;
    busy=true;document.getElementById('sendBtn').disabled=true;
    inp.value='';inp.style.height='auto';
    addMsg('user',text);showTyping();
    try{
      const r=await fetch(WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chatInput:text,sessionId:sid})});
      if(!r.ok)throw new Error('HTTP '+r.status);
      const d=await r.json();hideTyping();
      const reply=d.output||d.text||d.response||d.message||(Array.isArray(d)&&(d[0]?.output||d[0]?.text))||'';
      if(reply)addMsg('agent',reply);
      else showErr('לא התקבלה תשובה. נסה שוב.');
    }catch(e){showErr('בעיית חיבור. נסה שוב או פנה אלינו ב-arie@kappainv.com')}
    busy=false;document.getElementById('sendBtn').disabled=false;inp.focus();
  }
</script>
</body>
</html>
